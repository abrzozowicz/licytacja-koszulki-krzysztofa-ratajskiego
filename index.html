<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle Auction | Konserwacja</title>
    
    <meta property="og:title" content="Eagle Auction | Chwilowa Przerwa Techniczna 🦅">
    <meta property="og:description" content="Trwa konserwacja strony licytacji dla Maksa. Wrócimy za kilka chwil!">
    <meta property="og:image" content="https://i.imgur.com/uBvXqR3_d.jpeg">

    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --eagle-red: #d63031;
            --eagle-white: #ffffff;
            --bg-dark: #0a0a0a;
            --card-bg: #111;
            --border: #222;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background: var(--bg-dark); color: var(--eagle-white); 
            font-family: 'Inter', sans-serif; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
        }

        /* Tło Patriotyczne - Gradient Biało-Czerwony */
        .hero-header {
            width: 100%; height: 100%; text-align: center;
            background: linear-gradient(135deg, #d63031 0%, #8b0000 50%, #ffffff 100%);
            border-bottom: 5px solid var(--eagle-red);
            position: absolute; top: 0; left: 0; z-index: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px;
        }

        /* Główne Pudełko (Karta) */
        .maintenance-card {
            background: var(--card-bg); border-top: 5px solid var(--eagle-red);
            padding: 50px 30px; border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.7); text-align: center;
            position: relative; z-index: 10; max-width: 600px; width: 90%;
            border: 1px solid var(--border);
        }

        /* Nagłówek i Tekst */
        .maintenance-card h1 { 
            font-family: 'Oswald', sans-serif; font-size: clamp(2.5rem, 8vw, 4.5rem); 
            margin: 0; text-transform: uppercase; letter-spacing: -2px; line-height: 1;
            color: white; text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .maintenance-card p { 
            color: rgba(255,255,255,0.9); font-weight: 900; letter-spacing: 5px; 
            font-size: 1.1rem; margin-bottom: 10px; text-transform: uppercase;
        }

        .maintenance-card h2 { 
            color: rgba(255,255,255,0.7); font-weight: 400; 
            font-size: 1.3rem; margin-top: 10px; margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Stopka */
        .subtitle { color: #333; font-weight: 800; letter-spacing: 1px; margin-bottom: 15px; }
        
        /* Grafika Darterska (Opcjonalna - Np. Lotki w Tarczy) */
        .darts-icon { font-size: 3rem; margin-top: 20px; color: var(--eagle-red); }

        @media (max-width: 768px) {
            .maintenance-card { padding: 40px 20px; }
        }
    </style>
</head>
<body>

<div class="hero-header">
    <div class="maintenance-card">
        <p>Konserwacja Strony</p>
        <h1>Trwa Przerwa Techniczna</h1>
        
        <h2>Pracujemy nad usprawnieniami.<br>Wrócimy z większą siłą za kilka chwil! 🚀🦅</h2>
        
        <div class="subtitle">Aukcja Charytatywna</div>
        <div class="darts-icon">🎯🦅 dart 🎯🦅</div>
    </div>
</div>

</body>
</html>
