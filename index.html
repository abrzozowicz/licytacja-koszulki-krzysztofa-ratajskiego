<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przerwa techniczna - Licytacja dla Maksa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            color: #ff003c; /* Czerwony neonowy */
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        p {
            font-size: 1.2rem;
            color: #888;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .loader {
            margin-top: 30px;
            border: 3px solid #1a1a1a;
            border-top: 3px solid #2ecc71; /* Zielony neonowy */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🎯</div>
        <h1>Konserwujemy stronę</h1>
        <p>Trwają prace techniczne nad systemem licytacji. Zapraszamy ponownie wieczorem – wrócimy z pełną mocą!</p>
        <div class="loader"></div>
    </div>
</body>
</html>
