<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Licytacja dla Maksa!</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #2ecc71; --neon-red: #ff003c; --bg-black: #000000; --card-gray: #0a0a0a; --border: #1a1a1a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg-black); color: white; font-family: 'Inter', sans-serif; }
        .full-page { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .top-title-bar { width: 100%; background: var(--neon-red); color: white; text-align: center; padding: 15px; font-weight: 900; text-transform: uppercase; }
        .timer-section { width: 100%; padding: 20px; text-align: center; }
        #countdown { font-size: clamp(2rem, 8vw, 4rem); font-weight: 900; color: white; }
        .main-price { font-size: clamp(4rem, 15vw, 8rem); font-weight: 950; color: var(--neon-green); margin: 10px 0; }
        .status-bar { color: #888; font-weight: 700; text-transform: uppercase; margin-bottom: 20px; }
        .tiles-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 90%; max-width: 600px; margin-bottom: 20px; }
        .bid-tile { background: var(--card-gray); border: 1px solid var(--border); padding: 20px; border-radius: 10px; color: var(--neon-red); font-weight: 900; cursor: pointer; text-align: center; }
        .bid-tile.active { border-color: var(--neon-green); color: var(--neon-green); background: rgba(46,204,113,0.1); }
        .panel-box { background: var(--card-gray); padding: 20px; border-radius: 15px; border: 1px solid var(--border); width: 90%; max-width: 500px; margin-bottom: 20px; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; text-align: center; }
        .submit-btn { width: 100%; padding: 20px; background: var(--neon-green); color: black; font-weight: 900; border: none; border-radius: 10px; cursor: pointer; text-transform: uppercase; }
        .history-entry { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1a1a1a; }
        .history-val { color: var(--neon-green); font-weight: 900; }
        #thanks-modal { display: none; position: fixed; z-index: 999; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; flex-direction:column; }
        #thanks-modal.active { display: flex; }
    </style>
</head>
<body>

<div id="thanks-modal">
    <h2 style="color: var(--neon-green);">DZIĘKUJEMY!</h2>
    <p>Twoja oferta została zapisana.</p>
    <button onclick="location.reload()" style="padding: 10px 30px; cursor:pointer;">ZAMKNIJ</button>
</div>

<div class="full-page">
    <div class="top-title-bar">Licytacja dla Maksa!</div>
    
    <section class="timer-section">
        <div id="countdown">00 : 00 : 00 : 00</div>
    </section>

    <div class="main-price" id="displayPrice">...</div>
    <div class="status-bar" id="currentLeaderLabel">Ładowanie ceny...</div>

    <div class="tiles-grid">
        <div class="bid-tile" onclick="setStep(10, this)">+10</div>
        <div class="bid-tile" onclick="setStep(20, this)">+20</div>
        <div class="bid-tile" onclick="setStep(50, this)">+50</div>
        <div class="bid-tile" onclick="setStep(100, this)">+100</div>
        <div class="bid-tile" onclick="setStep(200, this)">+200</div>
        <div class="bid-tile" onclick="setStep(500, this)">+500</div>
    </div>

    <div class="panel-box">
        <input type="text" id="nameField" placeholder="Imię i Nazwisko">
        <input type="tel" id="phoneField" placeholder="Numer telefonu">
        <div id="newTotal" style="font-size: 1.5rem; margin: 15px 0; color: var(--neon-green);">Suma: ---</div>
        <button class="submit-btn" id="btnSubmit" onclick="submitBid()">Potwierdź licytację</button>
    </div>

    <div class="panel-box">
        <h3 style="text-transform: uppercase; font-size: 0.8rem; color: #555;">Ostatnie licytacje</h3>
        <div id="bidHistory">Pobieranie...</div>
    </div>
</div>

<script>
    const sheetDB_URL = "https://sheetdb.io/api/v1/q26o9bn9mcffp";
    const endDate = new Date("March 29, 2026 22:00:00").getTime();
    let currentPrice = 100;
    let selectedStep = 0;

    // Timer
    setInterval(() => {
        const now = new Date().getTime();
        const dist = endDate - now;
        if (dist < 0) { document.getElementById("countdown").innerText = "KONIEC"; return; }
        const d = Math.floor(dist / 86400000);
        const h = Math.floor((dist % 86400000) / 3600000);
        const m = Math.floor((dist % 3600000) / 60000);
        const s = Math.floor((dist % 60000) / 1000);
        document.getElementById("countdown").innerText = `${d}d : ${h}h : ${m}m : ${s}s`;
    }, 1000);

    async function refreshData() {
        try {
            const res = await fetch(`${sheetDB_URL}?_=${Date.now()}`);
            const data = await res.json();
            
            if (Array.isArray(data) && data.length > 0) {
                // Znajdź poprawne nazwy kluczy (bo SheetDB rozróżnia wielkość liter)
                const firstRow = data[0];
                const keyBid = Object.keys(firstRow).find(k => k.toLowerCase() === 'bid');
                const keyName = Object.keys(firstRow).find(k => k.toLowerCase() === 'name');

                // Filtrowanie i sortowanie numerów
                const validBids = data.filter(item => item[keyBid] && !isNaN(parseInt(item[keyBid])));
                
                if (validBids.length > 0) {
                    // Sortujemy numerycznie, żeby mieć PEWNOŚĆ co do najwyższej ceny
                    const sorted = [...validBids].sort((a, b) => parseInt(b[keyBid]) - parseInt(a[keyBid]));
                    currentPrice = parseInt(sorted[0][keyBid]);
                    
                    document.getElementById('displayPrice').innerText = currentPrice + " PLN";
                    const leader = sorted[0][keyName] ? sorted[0][keyName].split(' ')[0] : "Anonim";
                    document.getElementById('currentLeaderLabel').innerHTML = `Prowadzi: <span style="color:white">${leader}</span>`;

                    // Historia - 5 najnowszych wierszy z arkusza (chronologicznie ostatnie dodane)
                    const historyDiv = document.getElementById('bidHistory');
                    historyDiv.innerHTML = "";
                    const latest = validBids.slice(-5).reverse();
                    
                    latest.forEach(b => {
                        const div = document.createElement('div');
                        div.className = 'history-entry';
                        div.innerHTML = `<span>${b[keyName] ? b[keyName].split(' ')[0] : '???'}</span><span class="history-val">${b[keyBid]} PLN</span>`;
                        historyDiv.appendChild(div);
                    });
                }
            } else {
                document.getElementById('displayPrice').innerText = "100 PLN";
                document.getElementById('bidHistory').innerText = "Brak licytacji";
            }
        } catch (e) { console.error("Błąd fetch:", e); }
    }

    function setStep(val, el) {
        selectedStep = val;
        document.getElementById('newTotal').innerText = "Suma: " + (currentPrice + val) + " PLN";
        document.querySelectorAll('.bid-tile').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    async function submitBid() {
        const name = document.getElementById('nameField').value.trim();
        const phone = document.getElementById('phoneField').value.trim();
        if (!name || !phone || selectedStep === 0) { alert("Wypełnij wszystko!"); return; }

        const btn = document.getElementById('btnSubmit');
        btn.disabled = true; btn.innerText = "SŁANIE...";

        try {
            const finalBid = currentPrice + selectedStep;
            const res = await fetch(sheetDB_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "data": [{ "name": name, "phone": `'${phone}`, "bid": finalBid, "time": new Date().toLocaleString() }] })
            });

            if (res.ok) {
                document.getElementById('thanks-modal').classList.add('active');
            } else { alert("Błąd zapisu."); }
        } catch (e) { alert("Błąd sieci."); }
        btn.disabled = false; btn.innerText = "Potwierdź";
    }

    window.onload = refreshData;
    setInterval(refreshData, 10000);
</script>
</body>
</html>
